name: Deploy to Production

# Trigger: push (or merge) vào branch production
on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Không build trên CI — .next/ và node_modules/.prisma/ đã có trong repo
      # Build được thực hiện local trước khi commit

      - name: Deploy source + build to server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /httpdocs/
          exclude: |
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.local
            **/.env*.local
            **/prisma/prisma/*.db
            **/prisma/prisma/*.db-shm
            **/prisma/prisma/*.db-wal
            **/*.zip

      - name: Deploy Prisma client (includes Linux binaries) to server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./node_modules/.prisma/
          server-dir: /httpdocs/node_modules/.prisma/
          state-name: .ftp-prisma-state.json
